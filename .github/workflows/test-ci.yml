name: CI com Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositório
      uses: actions/checkout@v4

    - name: Build da imagem Docker
      run: docker build -t docauto .

    - name: Rodar container
      run: docker run --rm docautoname: CI com Docker

